<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in 🌸 SAT Practice</title>
  <script>(function(){try{var m=localStorage.getItem('mode');if(m!=='light'&&m!=='dark')m=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.dataset.mode=m;document.documentElement.dataset.theme='gray';}catch(e){}})();</script>
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>" />
</head>
<body>
  <div class="container" style="max-width:440px">
    <div class="card center" style="margin-top:48px">
      <div class="big" style="font-size:3rem">🌸</div>
      <h1>SAT Practice</h1>
      <p class="subtitle">Sign in to see your own questions and progress.</p>
      <form id="loginForm" style="margin-top:18px; text-align:left">
        <label class="spr-label" for="username">Username</label>
        <input class="spr-input" id="username" type="text" autocomplete="username" autofocus />
        <label class="spr-label" for="password" style="margin-top:14px">Password</label>
        <input class="spr-input" id="password" type="password" autocomplete="current-password" />
        <p class="note" id="err" style="color:var(--pink-600); min-height:20px; margin:10px 0 0"></p>
        <button class="btn btn-primary btn-lg" type="submit" style="width:100%; margin-top:8px">Sign in 💖</button>
      </form>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const err = document.getElementById('err');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.textContent = '';
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) { err.textContent = 'Enter your username and password.'; return; }
      try {
        await api('POST', '/api/login', { username, password });
        location.href = '/';
      } catch (e2) {
        err.textContent = e2.message || 'Could not sign in.';
      }
    });
  </script>
</body>
</html>
