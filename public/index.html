<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAT Practice 🌸</title>
  <script>(function(){try{var m=localStorage.getItem('mode');if(m!=='light'&&m!=='dark')m=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.dataset.mode=m;document.documentElement.dataset.theme=localStorage.getItem('theme')||'gray';}catch(e){}})();</script>
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>" />
</head>
<body>
  <div class="topbar">
    <a class="brand" href="/"><span class="brand-icon">🎓</span> SAT Practice</a>
    <div class="navlinks">
      <a href="/">Home</a>
      <a href="/dashboard.html">Dashboard</a>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <h1>Hi there! Ready to practice? 💖</h1>
      <p class="subtitle">Choose a topic below. You've got this! ✨</p>
      <div class="goal">
        <div>
          <div style="font-weight:800;color:var(--pink-600)">Today's goal</div>
          <div class="note" id="goalSub">Loading…</div>
        </div>
        <div class="goal-bar"><span id="goalFill" style="width:0%"></span></div>
        <div style="font-weight:800;color:var(--pink-600)" id="goalCount">0 / 40</div>
      </div>
    </div>

    <div id="activeBanner"></div>
    <div id="domainSections"><div class="spinner">Loading…</div></div>

    <div class="card center">
      <p class="note">Track your scores, charts, and progress here:</p>
      <a class="btn btn-ghost" href="/dashboard.html">📊 Open the Dashboard</a>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script>
    const DOMAIN_ORDER = [
      { domain: 'math',    emoji: '🔢', label: 'Math' },
      { domain: 'reading', emoji: '📖', label: 'Reading & Writing' },
    ];

    let ACTIVE = null;

    async function load() {
      const data = await api('GET', '/api/overview');
      ACTIVE = data.activeSession || null;

      // Active-attempt banner: only one attempt allowed at a time.
      const ab = document.getElementById('activeBanner');
      if (ACTIVE) {
        const emoji = ACTIVE.domain === 'math' ? '🔢' : '📖';
        ab.innerHTML = `<div class="card" style="border:2px solid var(--amber)">
          <h2 style="margin:0 0 6px">▶ Finish your active attempt first</h2>
          <p class="note" style="margin:0 0 14px">You're in the middle of <b>${emoji} ${escapeHtml(ACTIVE.topicName)} (${ACTIVE.difficulty})</b> — ${ACTIVE.answeredCount}/${ACTIVE.total} done. Only one attempt can be open at a time.</p>
          <a class="btn btn-primary btn-lg" href="/session.html?id=${ACTIVE.id}">Resume attempt →</a>
        </div>`;
      } else {
        ab.innerHTML = '';
      }

      // Goal banner
      const t = data.today;
      const pct = Math.min(100, Math.round((t.answeredToday / t.goal) * 100));
      document.getElementById('goalFill').style.width = pct + '%';
      document.getElementById('goalCount').textContent = `${t.answeredToday} / ${t.goal}`;
      document.getElementById('goalSub').textContent = t.met
        ? '🎉 Daily goal reached — fantastic work! Keep going if you like!'
        : `${t.goal - t.answeredToday} more question${t.goal - t.answeredToday === 1 ? '' : 's'} to reach today\'s goal.`;

      // Group catalogue by domain then topic
      const byDomainTopic = {};
      for (const item of data.catalogue) {
        const key = `${item.domain}|${item.topic}`;
        if (!byDomainTopic[key]) byDomainTopic[key] = { domain: item.domain, topic: item.topic, topicName: item.topicName, difficulties: [] };
        byDomainTopic[key].difficulties.push(item);
      }

      const wrap = document.getElementById('domainSections');
      wrap.innerHTML = '';

      for (const { domain, emoji, label } of DOMAIN_ORDER) {
        const topics = Object.values(byDomainTopic).filter(g => g.domain === domain);
        if (!topics.length) continue;

        const section = document.createElement('div');
        section.className = 'card';
        section.innerHTML = `<h2>${emoji} ${label}</h2><div class="topic-grid" id="tg-${domain}"></div>`;
        wrap.appendChild(section);

        const grid = section.querySelector(`#tg-${domain}`);

        for (const group of topics) {
          const topicCard = document.createElement('div');
          topicCard.className = 'topic-card';

          const diffButtons = group.difficulties.map(item => {
            const locked = !item.available;
            const hasActive = !!item.activeSessionId;
            let cls = 'diff-btn';
            if (locked) cls += ' locked';
            else if (hasActive) cls += ' active';

            const mastPct = item.total > 0 ? Math.round((item.mastered / item.total) * 100) : 0;
            const badge = hasActive ? '<span class="diff-badge resume">▶ resume</span>' : '';
            const progress = item.total > 0
              ? `<div class="diff-prog"><span style="width:${mastPct}%"></span></div>`
              : '';
            const countLine = locked
              ? `<span class="diff-count empty">No questions yet</span>`
              : `<span class="diff-count">${item.mastered}/${item.total} mastered</span>`;

            return `
              <button class="${cls}" data-topic="${item.topic}" data-difficulty="${item.difficulty}" ${locked ? 'disabled' : ''}>
                <span class="diff-label">${item.difficulty === 'medium' ? '🟡 Medium' : '🔴 Hard'}</span>
                ${badge}
                ${progress}
                ${countLine}
              </button>`;
          }).join('');

          topicCard.innerHTML = `
            <div class="topic-name">${group.topicName}</div>
            <div class="diff-row">${diffButtons}</div>
          `;
          grid.appendChild(topicCard);
        }
      }

      // Wire up buttons
      document.querySelectorAll('.diff-btn:not([disabled])').forEach(btn => {
        btn.addEventListener('click', () => startSession(btn.dataset.topic, btn.dataset.difficulty));
      });
    }

    async function startSection(section) { /* legacy — unused */ }

    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function startSession(topic, difficulty) {
      // Block starting a new attempt while one is active (server also enforces).
      if (ACTIVE && !(ACTIVE.topic === topic && ACTIVE.difficulty === difficulty)) {
        if (confirm(`You have an active ${ACTIVE.topicName} (${ACTIVE.difficulty}) attempt. Resume it now?`)) {
          window.location.href = `/session.html?id=${ACTIVE.id}`;
        }
        return;
      }
      try {
        const result = await api('POST', '/api/sessions', { topic, difficulty });
        window.location.href = `/session.html?id=${result.id}`;
      } catch (e) {
        if (e.data && e.data.activeSessionId &&
            confirm(`${e.message} Resume it now?`)) {
          window.location.href = `/session.html?id=${e.data.activeSessionId}`;
        } else {
          alert(e.message);
        }
      }
    }

    load().catch(e => {
      document.getElementById('domainSections').innerHTML = `<div class="card"><p class="note">Could not load: ${e.message}</p></div>`;
    });
  </script>
</body>
</html>
