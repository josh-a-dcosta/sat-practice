<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAT Practice 🏆</title>
  <script>(function(){try{var m=localStorage.getItem('mode');if(m!=='light'&&m!=='dark')m='dark';document.documentElement.dataset.mode=m;document.documentElement.dataset.theme=localStorage.getItem('theme')||'gray';}catch(e){}})();</script>
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>" />
</head>
<body>
  <div class="topbar">
    <a class="brand" href="/"><span class="brand-icon">🎓</span> SAT Practice</a>
    <div class="navlinks">
      <a class="nav-btn" href="/">🏠 Home</a>
      <a class="nav-btn" href="/dashboard.html">📊 Dashboard</a>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <h1>Hi there! Ready to practice?
        <span class="fetch-dog" role="img" aria-label="A little golden retriever puppy practicing fetch">
          <svg viewBox="0 0 120 44" xmlns="http://www.w3.org/2000/svg">
            <!-- tennis ball -->
            <g class="fd-ball">
              <circle cx="96" cy="34" r="6" fill="#cfe84a"/>
              <path d="M90.6 30.6 Q96 34 90.6 37.4" fill="none" stroke="#ffffff" stroke-width="1.1"/>
              <path d="M101.4 30.6 Q96 34 101.4 37.4" fill="none" stroke="#ffffff" stroke-width="1.1"/>
            </g>
            <!-- dog -->
            <g class="fd-dog">
              <ellipse class="fd-shadow" cx="20" cy="40.5" rx="15" ry="2.2"/>
              <g class="fd-bob">
                <!-- feathered tail -->
                <path class="fd-tail" d="M11 25 C 2 25 -3 18 0 12 C 3 16 6 20 13 22 Z" fill="#d39a40"/>
                <!-- back legs -->
                <rect class="fd-leg b" x="9"  y="28" width="3.4" height="10" rx="1.7" fill="#d6993f"/>
                <rect class="fd-leg a" x="15" y="28" width="3.4" height="10" rx="1.7" fill="#d6993f"/>
                <!-- body (sleek, elongated) -->
                <ellipse cx="19" cy="25" rx="13.5" ry="8" fill="#e3a64e"/>
                <!-- chest highlight -->
                <ellipse cx="28" cy="27" rx="5.5" ry="6.2" fill="#eec079"/>
                <!-- front legs -->
                <rect class="fd-leg a" x="24" y="28" width="3.4" height="10" rx="1.7" fill="#d6993f"/>
                <rect class="fd-leg b" x="29" y="28" width="3.4" height="10" rx="1.7" fill="#d6993f"/>
                <!-- head -->
                <circle cx="31" cy="16" r="7" fill="#e6ad57"/>
                <!-- floppy ear -->
                <ellipse cx="27.5" cy="19" rx="3.1" ry="7.5" fill="#c98a36" transform="rotate(10 27.5 19)"/>
                <!-- top-of-head highlight -->
                <path d="M26 11 Q31 7 36 12 Q31 11 26 14 Z" fill="#edba6a"/>
                <!-- long muzzle -->
                <ellipse cx="36.5" cy="19.5" rx="5.5" ry="3.6" fill="#eec079"/>
                <!-- nose -->
                <circle cx="40" cy="18.8" r="1.8" fill="#2e241f"/>
                <!-- eye -->
                <circle cx="33" cy="14.4" r="1.4" fill="#2e241f"/>
              </g>
            </g>
          </svg>
        </span>
      </h1>
      <p class="subtitle">Choose a topic below. You've got this! ✨</p>
      <div class="goal">
        <div>
          <div style="font-weight:800;color:var(--pink-600)">Today's goal</div>
          <div class="note" id="goalSub">Loading…</div>
        </div>
        <div class="goal-bar"><span id="goalFill" style="width:0%"></span></div>
        <div style="font-weight:800;color:var(--pink-600)" id="goalCount">0 / 40</div>
      </div>
    </div>

    <div id="activeBanner"></div>
    <div id="dailySummary"></div>
    <div id="domainSections"><div class="spinner">Loading…</div></div>
  </div>

  <!-- Start practice dialog (adjust per-question timer) -->
  <div class="modal-overlay hidden" id="startModal">
    <div class="modal-card" style="max-width:460px">
      <button class="modal-close" id="startClose" type="button" aria-label="Close">✕</button>
      <h2 id="startTitle" style="margin-top:0">Start practice</h2>
      <p class="note" id="startSub"></p>
      <label class="spr-label" for="startMins">Minutes per question</label>
      <input class="spr-input" id="startMins" type="number" min="0.5" max="10" step="0.5" />
      <p class="note">Round 1 default: 2 min (medium) / 2.5 min (hard). Round 2+ : 1 / 2 min. Adjust if you like.</p>
      <div style="display:flex; gap:10px; margin-top:14px">
        <button class="btn btn-primary btn-lg" id="startGo" type="button" style="flex:1">🚀 Start</button>
        <button class="btn btn-ghost btn-lg" id="startCancel" type="button">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script>
    const DOMAIN_ORDER = [
      { domain: 'math',    emoji: '🔢', label: 'Math' },
      { domain: 'reading', emoji: '📖', label: 'Reading & Writing' },
    ];

    let ACTIVE = [];        // in-progress rounds (one per section)

    async function load() {
      const data = await api('GET', '/api/overview');
      ACTIVE = data.activeSessions || [];

      // Quick-resume strip: several rounds can be going at once (one per
      // Domain·Difficulty), so list them all to jump straight back in.
      const ab = document.getElementById('activeBanner');
      if (ACTIVE.length) {
        const chips = ACTIVE.map((a) => {
          const emoji = a.domain === 'math' ? '🔢' : '📖';
          const diff = a.difficulty === 'hard' ? '🔴' : '🟡';
          const left = Math.max(0, a.total - a.answeredCount);
          const sk = a.skippedCount ? ` · ⏭ ${a.skippedCount}` : '';
          return `<a class="resume-chip" href="/session.html?id=${a.id}">
            ▶ ${emoji} ${escapeHtml(a.topicName)} ${diff} <span class="note">R${a.round} · ${left} left${sk}</span></a>`;
        }).join('');
        ab.innerHTML = `<div class="card resume-strip">
          <div style="font-weight:800; color:var(--pink-600); margin-bottom:8px">▶ Continue where you left off</div>
          <div class="resume-chips">${chips}</div>
        </div>`;
      } else {
        ab.innerHTML = '';
      }

      // Today's daily summary (from the activity log).
      const ds = document.getElementById('dailySummary');
      const todayKey = new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD local
      const todaySummary = (data.dailySummaries || []).find((s) => s.day === todayKey);
      if (todaySummary && todaySummary.total > 0) {
        const c = todaySummary.counts;
        ds.innerHTML = `<div class="card daily-summary">
          <div style="font-weight:800; color:var(--pink-600); margin-bottom:6px">📅 Today so far</div>
          <p style="margin:0 0 8px">${escapeHtml(todaySummary.text)}</p>
          <div class="ds-chips">
            <span class="ds-chip ok">✅ ${c.correct}</span>
            <span class="ds-chip bad">❌ ${c.wrong}</span>
            <span class="ds-chip">👀 ${c.peeked}</span>
            <span class="ds-chip">⏰ ${c.timedout}</span>
            <span class="ds-chip warn">⏭ ${c.skipped}</span>
          </div>
        </div>`;
      } else {
        ds.innerHTML = '';
      }

      // Goal banner: 40 Math + 40 Reading
      const t = data.today;
      const pct = Math.min(100, Math.round((t.answeredToday / t.goal) * 100));
      document.getElementById('goalFill').style.width = pct + '%';
      document.getElementById('goalCount').textContent = `🔢 ${t.mathToday}/${t.goalPerDomain} · 📖 ${t.readingToday}/${t.goalPerDomain}`;
      const mLeft = Math.max(0, t.goalPerDomain - t.mathToday);
      const rLeft = Math.max(0, t.goalPerDomain - t.readingToday);
      document.getElementById('goalSub').textContent = t.met
        ? '🎉 Both goals reached today — amazing! 40 Math + 40 Reading done!'
        : `Goal: 40 Math + 40 Reading. Left today — 🔢 ${mLeft} math, 📖 ${rLeft} reading.`;

      // Hierarchy: Math/Reading (tab) -> Difficulty -> Domain(topic) -> Skill
      const cat = data.catalogue;
      const skillCat = data.skillCatalogue || [];
      const wrap = document.getElementById('domainSections');
      wrap.innerHTML = '';
      const tabBar = document.createElement('div');
      tabBar.className = 'home-tabs';
      wrap.appendChild(tabBar);

      const avail = DOMAIN_ORDER.filter(d => cat.some(c => c.domain === d.domain && c.total > 0));
      const masteryClass = (p) => p >= 80 ? 'ok' : p >= 50 ? 'mid' : 'low';

      for (const { domain, emoji, label } of avail) {
        const tabBtn = document.createElement('button');
        tabBtn.className = 'home-tab';
        tabBtn.dataset.tab = domain;
        tabBtn.innerHTML = `${emoji} ${label}`;
        tabBtn.addEventListener('click', () => selectHomeTab(domain));
        tabBar.appendChild(tabBtn);

        const panel = document.createElement('div');
        panel.className = 'home-panel';
        panel.dataset.panel = domain;

        let html = '';
        for (const diff of ['hard', 'medium']) {
          const items = cat.filter(c => c.domain === domain && c.difficulty === diff && c.total > 0);
          if (!items.length) continue;
          html += `<h3 class="diff-group-h">${diff === 'medium' ? '🟡 Medium' : '🔴 Hard'}</h3><div class="topic-grid">`;
          for (const item of items) {
            const sk = skillCat.filter(s => s.domain === domain && s.topic === item.topic && s.difficulty === diff)
              .sort((a, b) => (a.mastered / a.total) - (b.mastered / b.total));
            const skillRows = sk.map(s => {
              const pct = s.total ? Math.round((s.mastered / s.total) * 100) : 0;
              return `<div class="skill-mini">
                <span class="sm-name">${escapeHtml(s.skill)}</span>
                <div class="sm-bar"><i class="${masteryClass(pct)}" style="width:${pct}%"></i></div>
                <span class="sm-pct">${s.mastered}/${s.total}</span></div>`;
            }).join('') || '<span class="note">No skills yet</span>';

            // One compact row per round: completion bar + accuracy bar side by
            // side. Round numbers are positional (1,2,3…) so they increment.
            const rounds = item.rounds || [];
            let roundBars = rounds.map((r, idx) => {
              const active = r.status === 'in_progress';
              const acc = r.resolved ? Math.round((r.correct / r.resolved) * 100) : 0;
              const accCls = acc >= 80 ? 'ok' : acc >= 50 ? 'mid' : 'low';
              const accBar = r.resolved
                ? `<div class="rr-bar acc"><span class="${accCls}" style="width:${acc}%"></span></div><span class="rr-pct">${acc}%</span>`
                : `<div class="rr-bar acc"><span style="width:0%"></span></div><span class="rr-pct note">—</span>`;
              const tag = active ? '<span class="rr-tag">◀ active</span>' : '';
              return `<div class="round-row${active ? ' active' : ''}">
                <span class="rr-label">Round ${idx + 1}</span>
                <div class="rr-bar"><span style="width:${r.pct}%"></span></div>
                <span class="rr-pct">${r.pct}%</span>
                <span class="rr-acc-label">Accuracy</span>
                ${accBar}
                ${tag}
              </div>`;
            }).join('');
            if (!rounds.length) {
              roundBars = `<div class="round-row">
                <span class="rr-label">Round 1</span>
                <div class="rr-bar"><span style="width:0%"></span></div>
                <span class="rr-pct">0%</span>
                <span class="rr-acc-label">Accuracy</span>
                <div class="rr-bar acc"><span style="width:0%"></span></div>
                <span class="rr-pct note">—</span>
                <span class="rr-tag note">not started</span>
              </div>`;
            }

            // Display round number is positional and consistent with the bars.
            const activeIdx = rounds.findIndex(r => r.status === 'in_progress');
            const displayRound = activeIdx >= 0 ? activeIdx + 1 : rounds.length + 1;

            // Start / Resume button reflects the section's state.
            let btnLabel, cls = 'btn btn-primary start-btn';
            if (item.activeSessionId) btnLabel = `▶ Resume Round ${displayRound}`;
            else if (item.prevComplete) btnLabel = `🔄 Start Round ${displayRound}`;
            else btnLabel = `🚀 Start Round ${displayRound}`;

            html += `<div class="topic-card">
              <div class="tc-head">
                <div class="topic-name">${escapeHtml(item.topicName)}</div>
                <span class="note tc-count">${item.total} Qs</span>
              </div>
              <div class="round-bars">${roundBars}</div>
              <button class="${cls}" data-topic="${item.topic}" data-difficulty="${diff}"
                      data-round="${displayRound}" data-deftl="${item.defaultTimeLimit}"
                      data-session="${item.activeSessionId || ''}" data-name="${escapeHtml(item.topicName)}">${btnLabel}</button>
              <div class="skill-mastery-h note">Skill mastery (correct at least once / total)</div>
              <div class="skill-mastery">${skillRows}</div>
            </div>`;
          }
          html += `</div>`;
        }
        panel.innerHTML = html;
        wrap.appendChild(panel);
      }

      document.querySelectorAll('.start-btn').forEach(btn => {
        btn.addEventListener('click', () => openStartModal(btn.dataset));
      });
      if (avail.length) selectHomeTab(avail[0].domain);
    }

    let PENDING = null;
    function openStartModal(d) {
      // Resume straight into this section's active round if there is one.
      if (d.session) { window.location.href = `/session.html?id=${d.session}`; return; }
      PENDING = { topic: d.topic, difficulty: d.difficulty };
      const diffName = d.difficulty === 'medium' ? 'Medium' : 'Hard';
      document.getElementById('startTitle').textContent = `${d.name} · ${diffName}`;
      document.getElementById('startSub').textContent = `Round ${d.round} — every question in this section, one timed pass. Skip the tricky ones and come back.`;
      document.getElementById('startMins').value = (Number(d.deftl) / 60);
      document.getElementById('startModal').classList.remove('hidden');
    }
    function closeStartModal() { document.getElementById('startModal').classList.add('hidden'); PENDING = null; }

    function selectHomeTab(domain) {
      document.querySelectorAll('.home-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === domain));
      document.querySelectorAll('.home-panel').forEach(p => p.classList.toggle('hidden', p.dataset.panel !== domain));
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function startSession(topic, difficulty, timeLimitSeconds) {
      // Many rounds can run at once (one per section); the server resumes this
      // section's round if one is open, otherwise starts the next round.
      try {
        const body = { topic, difficulty };
        if (timeLimitSeconds) body.timeLimitSeconds = timeLimitSeconds;
        const result = await api('POST', '/api/sessions', body);
        window.location.href = `/session.html?id=${result.id}`;
      } catch (e) {
        alert(e.message);
      }
    }

    document.getElementById('startGo').onclick = () => {
      if (!PENDING) return;
      const mins = parseFloat(document.getElementById('startMins').value);
      const secs = (mins && mins > 0) ? Math.round(mins * 60) : undefined;
      const p = PENDING; closeStartModal();
      startSession(p.topic, p.difficulty, secs);
    };
    document.getElementById('startCancel').onclick = closeStartModal;
    document.getElementById('startClose').onclick = closeStartModal;
    document.getElementById('startModal').addEventListener('click', (e) => { if (e.target.id === 'startModal') closeStartModal(); });

    load().catch(e => {
      document.getElementById('domainSections').innerHTML = `<div class="card"><p class="note">Could not load: ${e.message}</p></div>`;
    });
  </script>
</body>
</html>
